version: '3.8' # DockerComposeのファイルフォーマットバージョン。3.8が最新

services:
    app:
      container_name: app
      build: 
        context: ./task-checker-front
        dockerfile: Dockerfile
      ports:
        - "5173:5173"
      volumes:
        - ./task-checker-front:/app
        - /app/node_modules

    server:
      container_name: server
      build: 
        context: ./task-checker-back
        dockerfile: Dockerfile
      ports:
        - "3000:3000"
      depends_on:
        - db

    db:
      container_name: db
      image: "postgres:14.11"
      ports:
        - 5433:5432
      env_file:
        - ./task-checker-back/.env
      volumes:
        - taskchecker-db-volume:/var/lib/postgresql/data
volumes:
  taskchecker-db-volume: